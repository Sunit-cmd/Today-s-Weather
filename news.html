<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate & Weather News - Today's Weather</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1300px;
            padding: 20px;
            margin-top: 20px;
        }

        .news-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: var(--glass-shadow);
        }

        .news-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--glass-border);
        }

        .news-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .news-source {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .news-description {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .read-more {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .read-more:hover {
            color: var(--accent-hover);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--glass-border);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 40px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            color: #f87171;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li class="logo"><a href="index.html">🌤️ Today's Weather</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="news.html" class="active">News</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <div class="container" style="justify-content: flex-start; padding-top: 120px;">
            <div style="text-align: center; margin-bottom: 40px; width: 100%; padding: 0 20px;">
                <h1 style="font-size: 42px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;">Climate & Weather News</h1>
                <p style="color: var(--text-muted); font-size: 18px;">Stay updated on global environmental events and atmosphere shifts.</p>
            </div>

            <div id="newsLoader" class="loader"></div>
            <div id="newsGrid" class="news-grid"></div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="news.js"></script>
</body>
</html>
